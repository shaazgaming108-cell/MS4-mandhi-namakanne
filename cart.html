<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart - MyShop</title>

<style>

/* Reset */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter, system-ui, Arial;
}

body{
background:#f8fafc;
color:#0f172a;
}

/* Navbar */

header{
background:white;
border-bottom:1px solid #e2e8f0;
padding:18px 60px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:700;
}

nav a{
margin-left:30px;
text-decoration:none;
color:#334155;
font-weight:500;
}

.cart span{
background:#ef4444;
color:white;
padding:2px 6px;
border-radius:20px;
font-size:12px;
margin-left:5px;
}

/* Container */

.container{
padding:60px;
max-width:900px;
margin:auto;
}

/* Cart Items */

.cart-item{
display:flex;
align-items:center;
gap:20px;
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

.cart-item img{
width:120px;
height:90px;
object-fit:cover;
border-radius:8px;
}

.cart-info{
flex:1;
}

.cart-info h3{
margin-bottom:5px;
}

.price{
color:#475569;
}

/* Remove Button */

.remove{
background:#ef4444;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

/* Total Section */

.cart-summary{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
margin-top:20px;
}

.checkout{
margin-top:15px;
display:inline-block;
padding:12px 18px;
background:#0f172a;
color:white;
border-radius:8px;
text-decoration:none;
cursor:pointer;
}

</style>
</head>
